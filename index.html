<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>x6iny</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(270deg, #0a0a0a, #111, #1a1a1a);
  background-size: 600% 600%;
  animation: bgMove 14s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  width: 420px;
  padding: 38px;
  border-radius: 24px;
  text-align: center;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  box-shadow: 0 0 60px rgba(0,0,0,0.6);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

.pfp {
  width: 105px;
  height: 105px;
  border-radius: 50%;
  margin-bottom: 12px;
  border: 2px solid rgba(255,255,255,0.15);
}

.username {
  font-size: 26px;
  font-weight: 700;
}

.bio {
  font-size: 13px;
  opacity: 0.6;
  margin-top: 6px;
  margin-bottom: 14px;
}

.info {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 18px;
}

.chip {
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 999px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  opacity: 0.75;
  transition: 0.2s;
}

.chip:hover {
  opacity: 1;
  transform: scale(1.05);
}

.link {
  display: block;
  margin: 8px 0;
  padding: 11px;
  border-radius: 12px;

  text-decoration: none;
  color: white;
  font-size: 13px;

  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.25s;
}

.link:hover {
  background: rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

.song {
  margin-top: 14px;
  padding: 10px;
  border-radius: 12px;

  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
}

.song-title {
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 2px;
}

.song-name {
  font-size: 13px;
  margin-top: 4px;
  opacity: 0.85;
}

.play-btn {
  margin-top: 10px;
  padding: 9px 14px;
  border-radius: 10px;

  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.play-btn:hover {
  background: rgba(255,255,255,0.12);
}

.footer {
  margin-top: 12px;
  font-size: 11px;
  opacity: 0.35;
}
</style>
</head>

<body>

<div class="card">

  <img class="pfp" src="https://i.imgur.com/yourpfp.png" />

  <div class="username">x6iny</div>

  <div class="bio">
    “quiet minds move the loudest”
  </div>

  <div class="info">
    <div class="chip">age: 17</div>
    <div class="chip">status: online</div>
    <div class="chip">mood: detached</div>
    <div class="chip">energy: calm</div>
  </div>

  <!-- LINKS -->
  <a class="link" href="https://discord.com/users/YOUR_ID" target="_blank">discord</a>
  <a class="link" href="https://instagram.com/yourusername" target="_blank">instagram</a>
  <a class="link" href="https://open.spotify.com/user/yourprofile" target="_blank">spotify</a>

  <!-- MUSIC -->
  <div class="song">
    <div class="song-title">now playing</div>
    <div class="song-name">Duvet — Bôa</div>

    <button class="play-btn" onclick="toggleMusic()">play / pause</button>
    <audio id="music" src="YOUR_DUVET_MP3_LINK.mp3"></audio>
  </div>

  <div class="footer">aura.bio</div>

</div>

<script>
let playing = false;
const audio = document.getElementById("music");

function toggleMusic() {
  if (!playing) {
    audio.play();
    playing = true;
  } else {
    audio.pause();
    playing = false;
  }
}
</script>

</body>
</html>
