<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aura bio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(270deg, #0a0a0a, #111, #1a1a1a);
  background-size: 600% 600%;
  animation: bgMove 15s ease infinite;
  color: white;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 40px;
  border-radius: 25px;
  width: 420px;
  text-align: center;
  box-shadow: 0 0 60px rgba(0,0,0,0.6);
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.02);
}

.pfp {
  width: 110px;
  border-radius: 50%;
  margin-bottom: 15px;
  border: 2px solid rgba(255,255,255,0.2);
}

.username {
  font-size: 24px;
  font-weight: 700;
}

.bio {
  opacity: 0.6;
  margin-bottom: 20px;
}

.link {
  display: block;
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.link:hover {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
  transform: translateY(-2px);
}

/* PLAY BUTTON */

.play-btn {
  margin-top: 15px;
  cursor: pointer;
  padding: 10px 20px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  transition: 0.3s;
}

.play-btn:hover {
  background: rgba(255,255,255,0.1);
}

/* FOOTER */

.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="card">
  <img src="https://i.imgur.com/yourpfp.png" class="pfp">

  <div class="username">@yourname</div>
  <div class="bio">your aura goes here</div>

  <a href="#" class="link">Discord</a>
  <a href="#" class="link">TikTok</a>
  <a href="#" class="link">Instagram</a>

  <button class="play-btn" onclick="toggleMusic()">▶ play music</button>

  <audio id="music" src="YOUR_SONG_LINK_HERE.mp3"></audio>

  <div class="footer">aura page</div>
</div>

<script>
let playing = false;
const audio = document.getElementById("music");

function toggleMusic() {
  if (!playing) {
    audio.play();
    playing = true;
  } else {
    audio.pause();
    playing = false;
  }
}
</script>

</body>
</html>
