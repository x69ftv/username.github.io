<div class="music-card">
  <div class="music-title">Now Playing</div>
  <div class="music-song">BOA — Duvet</div>

  <button class="music-btn" onclick="toggleMusic()">
    ▶ Play / Pause
  </button>

  <audio id="bgmusic" loop>
    <source src="YOUR_DIRECT_AUDIO_LINK.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
const music = document.getElementById("bgmusic");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    playing = true;
  } else {
    music.pause();
    playing = false;
  }
}
</script>
