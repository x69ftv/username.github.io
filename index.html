<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>x6iny</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">
    <img src="https://i.imgur.com/Ac8raRK.jpeg" class="avatar">

    <h1>x6iny</h1>
    <p class="status">“lost in the glow”</p>

    <button onclick="toggleMusic()" class="music-btn">▶ play music</button>

    <audio id="bgmusic" loop>
      <source src="YOUR_AUDIO.mp3" type="audio/mpeg">
    </audio>
  </div>

<script>
const music = document.getElementById("bgmusic");

function toggleMusic() {
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
